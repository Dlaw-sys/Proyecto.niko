<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPLEO</title>
</head>
<body>
    <form action=""> 
        <h2>DATOS PERSONALES</h2>
        <label for="">NOMBRE</label>
         <input type="text" id="nombre" name="nombre" placeholder="Ej: Nicold">
<label for="">APELLIDO</label>
         <input type="text" id="apellido" name="nombre" placeholder="Ej: Mendez">
         <br>
         <label for="correoUsuario"> Correo electronico</label>
        <input type="text" id="correoUsuario" name="email" placeholder="correo@ejemplo.com" required>
    </form>    
    <form action="">
        <h2> DIGITE SU FECHA</h2>
        <label for="nacimiento"> fecha nacimiento</label>
        <input type="date" id="nacimiento" name="fecha_nac">
    </form>
     <form action="">
        <h2> Textarea y selects</h2>

        <label for="nivel estudio">NIVEL DE ESTUDIO</label>
        <select name="nivel de estudio" id="nivel de estudio">
            <option value="">--- SELECCIONE UN OPCION---</option>
            <option value="Pri">basica primaria</option>
            <option value="Se">basica segundaria</option>
            <option value="Ba">Bachiller</option>
    </select>
    </form>
    <br><br>
    <input type="number" min="0" max="50">
    <br><br>
    <h2> AÑOS DE EXPERIECIA</h2>
    <textarea name="mensaje" id="mensaje" rows="0" cols="50" placeholder="Escribe aqui..."></textarea>
    <br><br>
    <h2>LENJUAJE DE PROGRAMACION</h2>
    <input type="checkbox" id="js" name="js" required>
         <label for="js">JAVA SCRIPT</label>
         <br><br>
         <input type="checkbox" id="py" name="py" required>
         <label for="py">PYTHON</label>
         <br><br>
         <input type="checkbox" id="html" name="html" required>
         <label for="html">HTML.COM</label>
         <br><br>
         <textarea name="carta de presentacion" id="carta" rows="4" cols="50" placeholder="cuentanos mas de ti"></textarea>
          
         <br><br>
         <button type="submit">Enviar Formulario </button>
         <button type="reset">Limpiar Formulario </button>







        

</body>
</html>
